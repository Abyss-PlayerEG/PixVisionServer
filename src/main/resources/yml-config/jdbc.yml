# 数据源配置
spring:
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/db_muying?allowPublicKeyRetrieval=true&useSSL=false
        username: root
        password: 123456
        hikari:
            maximum-pool-size: 20       # 最大连接数
            minimum-idle: 5             # 最小空闲连接数
            connection-timeout: 20000   # 连接超时时间（毫秒）
            idle-timeout: 300000        # 连接空闲超时时间（毫秒）
            max-lifetime: 1200000       # 连接最大生命周期（毫秒）
    jpa:
        database: MYSQL
        hibernate:
            ddl-auto: validate          # 数据库操作方式-创建表方式
        show-sql: true                  # 是否打印sql

