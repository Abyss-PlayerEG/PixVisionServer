# redis 配置
spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      database: 0
      # 连接池
      jedis:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1 # -1 表示没有限制
          time-between-eviction-runs: 1000 # 连接空闲时间
