### MuYing服务配置文件

#### 服务端口
#server:
#  port: 9090

#### CORS 跨域配置
#cors:
#  # 允许的跨域源地址（多个地址用逗号分隔）
#  # 注意：当 allowCredentials=true 时，不能使用 "*"，必须指定具体域名
#  # 开发环境示例："http://localhost:3000, http://localhost:5173"
#  # 生产环境示例："https://yourdomain.com, https://www.yourdomain.com"
#  allowed-origin: "
#  http://localhost:3000,
#  http://localhost:5173,
#  http://127.0.0.1:3000,
#  http://127.0.0.1:5173,
#  https://yourdomain.com,
#  https://www.yourdomain.com
#  "

