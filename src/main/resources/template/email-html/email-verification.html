<!-- Pixie Vision 艺术风格模板 -->
<!--
占位符说明：
{{logoUriLight}}: 浅色模式 logo Base64 (建议更换为透明背景的精致图标)
{{logoUriDark}}: 深色模式 logo Base64
{{username}}：用户名
{{email_text}}：邮箱操作内容
{{code}}：验证码
{{year}}：当前年份
{{systemName}}：系统名称
{{expireTime}}：过期时间
-->
<!DOCTYPE html>
<html lang='zh-CN'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>邮箱验证码 | Artistic Verification</title>
  <style type='text/css'>
    /* 全局重置与基础字体 */
    body {
      margin: 0;
      padding: 0;
      min-width: 100%;
      /* 艺术感渐变背景：模拟水彩纸或晨曦天空 */
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Georgia', 'Times New Roman', serif; /* 使用衬线体增加艺术感 */
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      color: #2c3e50;
    }

    table { border-spacing: 0; border-collapse: collapse; }
    img { border: 0; display: block; }

    /* 包装器：增加上下留白，营造呼吸感 */
    .wrapper {
      width: 100%;
      table-layout: fixed;
      background: transparent;
      padding: 40px 0 60px;
    }

    /* 主容器：毛玻璃效果 (Glassmorphism) */
    .main-container {
      background-color: rgba(255, 255, 255, 0.85); /* 半透明白 */
      backdrop-filter: blur(10px); /* 模糊背景 */
      -webkit-backdrop-filter: blur(10px);
      margin: 0 auto;
      width: 100%;
      max-width: 560px;
      border-radius: 20px;
      overflow: hidden;
      /* 柔和的多层阴影，营造悬浮感 */
      box-shadow:
              0 10px 30px rgba(0,0,0,0.05),
              0 1px 3px rgba(0,0,0,0.03);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* 顶部装饰条：渐变色，替代原本的单色条 */
    .header-bar {
      height: 8px;
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
    }

    /* Logo 区域：增加留白，居中 */
    .logo-section {
      text-align: center;
      padding: 40px 30px 30px;
      background: transparent;
    }

    .logo-image {
      width: 90px;
      height: 90px;
      object-fit: contain; // 填充图片
      /* 给Logo加一点柔和的投影 */
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    /* 内容区域 */
    .content-padding {
      padding: 10px 40px 40px;
      text-align: center; /* 内容居中，更具海报感 */
    }

    /* 标题样式 */
    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: normal; /* 艺术风格通常不用太粗的字重 */
      font-style: italic; /* 斜体增加优雅感 */
      color: #1a202c;
      letter-spacing: 1px;
    }

    /* 正文样式 */
    .text-primary {
      color: #4a5568;
      font-size: 16px;
      line-height: 1.8; /* 增加行高，阅读更舒适 */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* 正文用无衬线体保证易读性 */
      margin-bottom: 15px;
    }

    .highlight-text {
      color: #2575fc;
      font-weight: 600;
      position: relative;
      display: inline-block;
    }

    /* 验证码核心区域：设计成类似“艺术票根”或“印章”的风格 */
    .code-box {
      background: #fff;
      /* 虚线边框模仿撕纸效果 */
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 30px 10px;
      margin: 35px 0;
      text-align: center;
      position: relative;
      /* 内部微阴影 */
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
      background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
      background-size: 10px 10px; /* 点阵背景增加质感 */
    }

    .code-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 42px;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: 12px;
      display: inline-block;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.1); /* 轻微立体感 */
      background: linear-gradient(120deg, #2575fc, #6a11cb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; /* 渐变色文字 */
    }

    /* 底部提示 */
    .expire-text {
      margin: 0;
      text-align: center;
      font-size: 14px;
      color: #718096;
      font-style: italic;
      font-family: 'Georgia', serif;
    }

    /* 底部区域：极简风格 */
    .footer-section {
      background-color: rgba(248, 249, 250, 0.5);
      border-top: 1px solid rgba(0,0,0,0.05);
      padding: 30px 30px;
      text-align: center;
    }

    .text-secondary {
      color: #a0aec0;
      font-size: 12px;
      line-height: 1.6;
      font-family: 'Helvetica Neue', sans-serif;
    }

    .auto-send-text {
      margin-top: 25px;
      font-size: 11px;
      color: #cbd5e0;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* 深色模式支持 */
    @media (prefers-color-scheme: dark) {
      body {
        /* 深色艺术背景：深邃夜空 */
        background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        color: #e2e8f0;
      }

      .wrapper { background-color: transparent; }

      .main-container {
        background-color: rgba(45, 55, 72, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.1);
      }

      .logo-section { background-color: transparent; }

      .code-box {
        background-color: rgba(0,0,0,0.2);
        border-color: #4a5568;
        background-image: radial-gradient(#4a5568 1px, transparent 1px);
      }

      .code-text {
        /* 深色模式下保持渐变文字可见性 */
        background: linear-gradient(120deg, #63b3ed, #b794f4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
      }

      .footer-section {
        background-color: rgba(0,0,0,0.2);
        border-top-color: rgba(255,255,255,0.05);
      }

      .text-primary { color: #cbd5e0; }
      .text-secondary { color: #718096; }
      .expire-text { color: #a0aec0; }
      h1 { color: #f7fafc; }
      .highlight-text { color: #63b3ed; }

      .logo-light { display: none !important; }
      .logo-dark { display: inline-block !important; }
    }

    .logo-dark { display: none; }
    .logo-light { display: inline-block; }

    /* 移动端适配 */
    @media only screen and (max-width: 600px) {
      .content-padding { padding: 10px 25px 30px; }
      .code-text { font-size: 32px; letter-spacing: 8px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class='wrapper' style="text-align: center;">
  <table width='100%'>
    <tr>
      <td align='center'>
        <!-- 主卡片 -->
        <div class='main-container'>
          <!-- 顶部艺术渐变色条 -->
          <div class='header-bar'></div>

          <!-- Logo 区域 -->
          <div class='logo-section'>
            <!-- 浅色模式 logo -->
            <img src='{{logoUriLight}}' alt='Logo' class='logo-image logo-light' />
            <!-- 深色模式 logo -->
            <img src='{{logoUriDark}}' alt='Logo' class='logo-image logo-dark' />
          </div>

          <!-- 内容区域 -->
          <table width='100%'>
            <tr>
              <td class='content-padding'>
                <h1>Verification Code</h1>
                <p class='text-primary'>尊贵的 {{username}}</p>
                <p class='text-primary'>
                  您正在 <strong class='highlight-text'>{{systemName}}</strong> 进行
                  <span style='border-bottom: 2px dashed #a0aec0;'>{{email_text}}</span> 操作
                  <br>
                  这是一把临时的数字钥匙，请妥善保管
                </p>

                <!-- 验证码核心区域：艺术票根风格 -->
                <div class='code-box'>
                  <span class='code-text'>{{code}}</span>
                </div>

                <!-- 提示信息 -->
                <p class='expire-text'>
                  此密钥有效期为 <strong>{{expireTime}}分钟</strong><br>
                  如非本人操作，请忽略此信件
                </p>
              </td>
            </tr>
          </table>

          <!-- 底部区域 -->
          <div class='footer-section'>
            <p class='text-secondary' style='margin: 0 0 10px;'>
              &copy; {{year}} {{systemName}}. Crafted with care.
            </p>
            <p class='text-secondary' style='margin: 0;'>
              All rights reserved.
            </p>

            <!-- 外部版权/退订链接 (可选) -->
            <p class='auto-send-text'>
              SYSTEM AUTO-GENERATED MESSAGE
            </p>
          </div>
        </div>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
