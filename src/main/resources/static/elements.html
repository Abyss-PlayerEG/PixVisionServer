<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API 文档 - Stoplight Elements</title>
  <!-- 引入 Stoplight Elements 的样式 -->
  <link href="./elements/styles.min.css" rel="stylesheet">
  <!-- 引入 Stoplight Elements 的 Web Components 脚本 -->
  <script src="./elements/web-components.min.js"></script>
</head>
<body style="height: 100vh; margin: 0;">
<elements-api
  apiDescriptionUrl="/v3/api-docs"
  id="api-docs"
  layout="sidebar"
  router="hash"
  tryItCredentialsPolicy="include"
/>
<script>
(function() {
  var api = document.getElementById('api-docs');

  // 获取 SpringDoc 分组列表并注入选择器到 Elements header
  function injectGroupSelector() {
    fetch('/v3/api-docs/swagger-config')
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(config) {
        var urls = config.urls || [];
        if (urls.length <= 1) return;

        var container = document.createElement('div');
        container.innerHTML =
          '<label style="font-size:12px;font-weight:500;opacity:0.7;white-space:nowrap;">API 分组</label>' +
          '<select id="group-select" style="min-width:180px;">' +
            '<option value="/v3/api-docs">全部 API（合并）</option>' +
            urls.map(function(u) {
              return '<option value="' + u.url + '">' + u.name + '</option>';
            }).join('') +
          '</select>';

        var wrapper = document.createElement('div');
        wrapper.slot = 'header';
        wrapper.style.cssText = 'display:inline-flex;align-items:center;gap:8px';
        wrapper.appendChild(container);
        api.appendChild(wrapper);

        container.querySelector('select').addEventListener('change', function() {
          api.setAttribute('apiDescriptionUrl', this.value);
        });
      })
      .catch(function() {});
  }

  // 等待 Elements Shadow DOM 就绪后注入
  var n = 0;
  var t = setInterval(function() {
    n++;
    if ((api.shadowRoot && api.shadowRoot.querySelector('[class*="sl-"]')) || n > 50) {
      clearInterval(t);
      injectGroupSelector();
    }
  }, 100);
})();
</script>
</body>
</html>
