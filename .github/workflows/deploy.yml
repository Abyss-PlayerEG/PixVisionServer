name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Compress JAR for Faster Transfer
        run: |
          JAR_FILE=$(ls target/PixVisionServer-*.jar | head -1)
          gzip -9 -c "$JAR_FILE" > target/PixVisionServer.jar.gz
          echo "Compressed: $(ls -lh target/PixVisionServer.jar.gz)"

      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE || '' }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'target/PixVisionServer.jar.gz'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Restart Service on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE || '' }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="/opt/java-app"
            APP_JAR="$APP_DIR/PixVisionServer.jar"
            BACKUP_JAR="$APP_DIR/PixVisionServer.jar.bak"
            GZ_FILE="$DEPLOY_DIR/PixVisionServer.jar.gz"

            if [ ! -f "$GZ_FILE" ]; then
              echo "ERROR: Compressed JAR not found: $GZ_FILE"
              exit 1
            fi

            echo "Found compressed JAR: $GZ_FILE"

            # 解压 JAR
            echo "Decompressing JAR..."
            gunzip -c "$GZ_FILE" > "$DEPLOY_DIR/temp.jar"
            rm "$GZ_FILE"

            # 先停止旧服务
            sudo systemctl stop pix-version.service
            echo "Stopped pix-version service"

            # 备份旧 JAR，便于回滚
            if [ -f "$APP_JAR" ]; then
              sudo cp "$APP_JAR" "$BACKUP_JAR"
              echo "Backed up old JAR to $BACKUP_JAR"
            fi

            # 替换 JAR
            sudo mv "$DEPLOY_DIR/temp.jar" "$APP_JAR"
            sudo chmod 644 "$APP_JAR"

            echo "Replaced $APP_JAR"

            # 启动新服务
            sudo systemctl start pix-version.service

            # 等待几秒确认启动成功
            sleep 5

            if systemctl is-active --quiet pix-version.service; then
              echo "Service is running"
              sudo systemctl status pix-version.service --no-pager
            else
              echo "ERROR: Service failed to start! Rolling back..."
              sudo mv "$BACKUP_JAR" "$APP_JAR"
              sudo systemctl start pix-version.service
              exit 1
            fi

            echo "Deploy completed successfully!"
