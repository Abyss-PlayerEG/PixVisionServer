name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE || '' }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'target/PixVisionServer-*.jar'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Restart Service on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE || '' }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="/opt/java-app"
            APP_JAR="$APP_DIR/PixVisionServer.jar"
            BACKUP_JAR="$APP_DIR/PixVisionServer.jar.bak"

            JAR_SRC=$(ls -t "$DEPLOY_DIR"/PixVisionServer-*.jar 2>/dev/null | head -1)

            if [ -z "$JAR_SRC" ]; then
              echo "ERROR: No JAR file found in $DEPLOY_DIR"
              exit 1
            fi

            echo "Found new JAR: $JAR_SRC"

            # 先停止旧服务
            sudo systemctl stop pix-version.service
            echo "Stopped pix-version service"

            # 备份旧 JAR，便于回滚
            if [ -f "$APP_JAR" ]; then
              sudo cp "$APP_JAR" "$BACKUP_JAR"
              echo "Backed up old JAR to $BACKUP_JAR"
            fi

            # 替换为不带版本号的固定名称，匹配 systemd 服务配置
            sudo mv "$JAR_SRC" "$APP_JAR"
            sudo chmod 644 "$APP_JAR"

            echo "Replaced $APP_JAR"

            # 启动新服务
            sudo systemctl start pix-version.service

            # 等待几秒确认启动成功
            sleep 5

            if systemctl is-active --quiet pix-version.service; then
              echo "Service is running"
              sudo systemctl status pix-version.service --no-pager
            else
              echo "ERROR: Service failed to start! Rolling back..."
              sudo mv "$BACKUP_JAR" "$APP_JAR"
              sudo systemctl start pix-version.service
              exit 1
            fi

            echo "Deploy completed successfully!"
